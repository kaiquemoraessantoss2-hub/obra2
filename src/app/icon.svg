<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="7" fill="#0f172a"/>
  <!-- horizontal bars -->
  <line x1="7" y1="10" x2="25" y2="10" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="7" y1="16" x2="25" y2="16" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="7" y1="22" x2="25" y2="22" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <!-- vertical bars -->
  <line x1="10" y1="7" x2="10" y2="25" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="16" y1="7" x2="16" y2="25" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="7" x2="22" y2="25" stroke="#3b82f6" stroke-width="2" stroke-linecap="round"/>
  <!-- intersection nodes -->
  <circle cx="10" cy="10" r="2" fill="#93c5fd"/>
  <circle cx="16" cy="10" r="2" fill="#93c5fd"/>
  <circle cx="22" cy="10" r="2" fill="#93c5fd"/>
  <circle cx="10" cy="16" r="2" fill="#93c5fd"/>
  <circle cx="16" cy="16" r="2.5" fill="#bfdbfe"/>
  <circle cx="22" cy="16" r="2" fill="#93c5fd"/>
  <circle cx="10" cy="22" r="2" fill="#93c5fd"/>
  <circle cx="16" cy="22" r="2" fill="#93c5fd"/>
  <circle cx="22" cy="22" r="2" fill="#93c5fd"/>
</svg>
